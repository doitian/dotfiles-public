[env._]
path = ["{{config_root}}/node_modules/.bin"]

[tasks."pre-commit:typos"]
run = "typos"

[tasks.pre-commit]
depends = ["pre-commit:*"]

[tasks.build]
alias = "default"
run = ["bun install", "bun run build"]
sources = [
  "package.json",
  "bun.lock",
  "build.js",
  "src/**/*.js",
  "../private/src/**/*.js",
]

[tasks.clean]
run = "fd --no-ignore -t f . dist -x rm"
