[[battery.display]]
threshold = 30
style = "bold yellow"

[env_var.http_proxy]
format = 'у°ҡ» '

[env_var.WSL_DISTRO_NAME]
format = 'in рҹӘҹ [$env_value]($style) '

[env_var.__MISE_SESSION]
