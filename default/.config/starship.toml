add_newline = false

[directory]
truncation_length = 5
truncation_symbol = "вҖҰ/"
repo_root_style = "cyan bold italic"
repo_root_format = '[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) '
read_only = " у°Ңҫ"

[hostname]
# ssh_symbol = ""
ssh_symbol = "о¬Ғ "
format = '[$ssh_symbol$hostname:]($style)'

[git_branch]
# symbol = "Вұ"
symbol = "пҗҳ "
style = "green"

[git_status]
format = '([\[](white bold)[$all_status$ahead_behind]($style)[\]](white bold)) '
ahead = "вҶ‘"
behind = "вҶ“"
conflicted = "[!](red)"
diverged = "вҶ•"
modified = '[!](bright-yellow bold)'
renamed = '[В»](bright-yellow bold)'
staged = '[+](green bold)'
up_to_date = '[вүЎ](green bold)'
windows_starship = "starship.exe"

[status]
disabled = false
# symbol = ''
symbol = 'у°—ј '

[shell]
disabled = false
zsh_indicator = ''
powershell_indicator = ''
unknown_indicator = 'sh?'
format = '[$indicator]($style)'

# [battery]
# full_symbol = "рҹ”Ӣ "
# charging_symbol = "вҡЎпёҸ "
# discharging_symbol = "рҹ’Җ "
# unknown_symbol = "рҹ’Җ "
# empty_symbol = "рҹӘ« "
[[battery.display]]
threshold = 10
